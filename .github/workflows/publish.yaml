name: Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --frozen --only-group dev

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Check distributions
        run: uv run twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  build-exe:
    name: Build Windows .exe with Nuitka
    runs-on: windows-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install project and dependencies
        run: uv sync --frozen --all-groups

      - name: Build standalone .exe with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: 4.0.8
          script-name: src/pywc/console.py
          mode: onefile
          output-file: pywc.exe

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: pywc-windows-exe
          path: build/pywc.exe
          if-no-files-found: error

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/${{ vars.PYPI_PACKAGE_NAME || github.event.repository.name }}
    permissions:
      id-token: write   # kept for future Trusted Publishing support
      contents: read

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Publish to TestPyPI
        run: |
          uv publish \
            --publish-url https://test.pypi.org/legacy/ \
            --trusted-publishing never \
            dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}

  release:
    name: Create GitHub Release
    needs: [build, build-exe]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download Windows .exe
        uses: actions/download-artifact@v4
        with:
          name: pywc-windows-exe
          path: exe/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            exe/pywc.exe
          generate_release_notes: true
          # Make it a prerelease for pre-release tags (e.g. v1.0.0-rc1)
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
