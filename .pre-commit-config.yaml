repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0  # Check latest at https://github.com/pre-commit/pre-commit-hooks/releases
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-symlinks
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-xml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: detect-private-key
      - id: fix-byte-order-marker
      - id: forbid-submodules
      # - id: name-tests-test # Will enable later, used test_* format initially
      - id: pretty-format-json
        args:
          - --autofix
      - id: check-added-large-files
        args: ["--maxkb=500"]  # Adjust as needed
      - id: mixed-line-ending
        args: ["--fix=lf"]
      # Allow commits to main in personal one-developer project
      # - id: no-commit-to-branch
      #   args: ["--branch=main", "--branch=master"]
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
    - id: codespell
      args:
        - --exclude-file=uv.lock
      additional_dependencies:
        - tomli
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
      - id: ruff-format # Running after check, in case --fix is added later
  - repo: https://github.com/dzhu/rstfmt
    rev: v0.0.14
    hooks:
    - id: rstfmt
  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
    - id: mdformat
      additional_dependencies:
      - mdformat-myst
      - mdformat-black
      - mdformat-web
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.21.1
    hooks:
      - id: pyproject-fmt
  - repo: https://github.com/boidolr/pre-commit-images
    rev: v1.12.0
    hooks:
    - id: optimize-svg
  # TODO: find yaml hooks
  # TODO: switch from mypy to ty once
  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uvx ty check .
        language: system
        pass_filenames: false
        always_run: true
